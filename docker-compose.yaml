version: "1.0"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sublease-backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - sublease-network
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    environment:
      INTERNAL_API_BASE_URL: http://sublease-backend:8000
    container_name: sublease-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - sublease-network

networks:
  sublease-network:
    driver: bridge